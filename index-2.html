      1: { pages: [
        { title: 'What is NeuralFusion™?', body: 'NeuralFusion™ is a cognitive performance operating system — not a productivity tool, not a wellness app, not a personality framework.\n\nIt is a structured system for training how you think.\n\nMost people have never been taught the mechanics of thinking itself. They have been taught what to think. They have been taught facts, beliefs, and behaviors. But not the cognitive architecture that produces them.\n\nNeuralFusion™ changes that.' },
        { title: 'The Four Brains Framework', body: 'Every human being operates through four fundamental thinking modes. These are not personality types — they are cognitive instruments:\n\n◰ ANALYTICAL BRAIN — Logic, structure, evidence, precision\n◱ INTUITIVE BRAIN — Pattern recognition, signal, gut intelligence\n◲ ASSOCIATIVE BRAIN — Creative connection, synthesis, lateral expansion\n◳ REFLECTIVE BRAIN — Meta-cognition, meaning, self-awareness\n\nMost people are dominated by one or two modes and barely activate the others. This is cognitive fragmentation — and it is the source of most poor thinking.' },
        { title: 'The Integration Protocol', body: 'NeuralFusion™ trains you to deliberately activate all four brains in sequence:\n\n1. DECOMPOSE — Analytical Brain activates. Break the problem into precise parts.\n2. SENSE — Intuitive Brain activates. Read the signal beneath the data.\n3. EXPAND — Associative Brain activates. Generate connections and alternatives.\n4. REFLECT — Reflective Brain activates. Evaluate and synthesize.\n5. FUSE — All four outputs integrate into a unified cognitive position.\n\nThis is the Core Loop. With training, it completes in under 90 seconds.' },
        { title: 'First Activation Exercise', body: 'Select a real situation you are currently navigating.\n\nActivate each brain deliberately:\n\n◰ ANALYTICAL: State the situation as pure fact. No interpretation. No emotion. Just structure.\n◱ INTUITIVE: Pause. What does your gut signal? What feels true before analysis arrives?\n◲ ASSOCIATIVE: What else is this connected to? What pattern have you seen before? What alternative frame exists?\n◳ REFLECTIVE: What does this reveal about your thinking? What assumption is operating below the surface?\n\nWrite one sentence for each brain. Observe what emerges when all four speak.' },

        { title: 'The Architecture of Mental Control', body: 'Mental control is not suppression. It is not forced calm. It is not discipline over thought.\n\nMental control is the ability to choose which brain is operating at any given moment.\n\nMost people have no access to this choice. Their brains switch automatically — driven by emotion, habit, urgency, and fear. NeuralFusion™ installs the switch.\n\nYou do not control what happens. You control which cognitive mode processes it.' },
        { title: 'Brain Mode Entry Signals', body: 'Each brain has a deliberate activation protocol:\n\n◰ ANALYTICAL ENTRY: Ask — "What are the verifiable facts here?"\nThis collapses emotion and engages structural processing.\n\n◱ INTUITIVE ENTRY: Pause for 3 seconds. Ask — "What does my body signal?"\nThis quiets logic noise and allows pattern data to surface.\n\n◲ ASSOCIATIVE ENTRY: Ask — "What does this remind me of? What else is this?"\nThis triggers lateral thinking and cross-domain connection.\n\n◳ REFLECTIVE ENTRY: Ask — "What does this reveal about my thinking?"\nThis activates meta-cognition and recursive self-evaluation.' },
        { title: 'The Mode Switching Drill', body: 'Exercise: Deliberate Mode Cycling (8 minutes)\n\nChoose a current challenge.\n\nSet a 90-second timer for each brain:\n◰ 90 sec → List only facts. No judgment.\n◱ 90 sec → Write your gut signal. No editing.\n◲ 90 sec → Write 3 unexpected connections or alternatives.\n◳ 90 sec → Write one honest observation about your own thinking.\n\nThen synthesize: write one sentence that integrates all four outputs.\n\nThis is cognitive mode training. Repeat daily for 14 days.' },
        { title: 'Emergency Cognitive Reset', body: 'When mental state becomes overwhelmed:\n\n1. IDENTIFY — Which brain is currently dominating? (Usually Intuitive under fear, or Analytical under stress)\n2. NAME IT — "I am in Analytical overdrive."\n3. SWITCH — Deliberately activate Reflective Brain: "What is one thing I can observe about this moment?"\n4. RETURN — From Reflective, you can consciously choose the next mode.\n\nThe reset protocol takes under 60 seconds.\n\nKey insight: The goal is not to eliminate any brain mode. Every mode has intelligence. The goal is to choose — not react.' },
      ]},
      3: { pages: [
        { title: 'Why Decisions Fragment', body: 'Most people make poor decisions not because they lack intelligence — but because their four brains are arguing.\n\nAnalytical says: "The data is unclear. Wait."\nIntuitive says: "Something feels wrong. Do not commit."\nAssociative says: "There is another option. Keep exploring."\nReflective says: "This does not align with your values."\n\nFour brains. Zero synthesis. No decision.\n\nNeuralFusion™ does not ask you to silence any brain. It trains you to integrate them into a single, unified cognitive position.' },
        { title: 'The Synthesis Framework', body: 'After running all four brain modes, synthesis follows a precise sequence:\n\n1. EXTRACT — Identify the primary output from each brain. One sentence per mode.\n2. IDENTIFY CONFLICT — Where do the outputs contradict? Name it explicitly.\n3. RESOLVE CONFLICT — Which brain has the most relevant information for THIS decision? Grant it temporary authority.\n4. COMPRESS — Reduce all four outputs into one unified position. This is your synthesis.\n5. LOCK — Commit mentally to the synthesis. Stop reprocessing.\n\nThis is the Commitment Lock. Once activated, re-analysis requires new data — not old doubt.' },
        { title: 'Recognizing Cognitive Loops', body: 'A cognitive loop occurs when you revisit a decision repeatedly without new information.\n\nSymptoms:\n· Returning to the same question multiple times\n· Feeling "something is off" without identifying what\n· Inability to commit despite having sufficient data\n· Mental exhaustion from circular thinking\n\nLoop Interruption Protocol:\n1. Name the loop: "I am in a decision loop about X"\n2. Identify the dominant brain: Which mode is generating the re-analysis?\n3. Perform a Reflective check: Is there actually new information? If no — lock the synthesis.\n4. Take one concrete action in the direction of the decision.' },
        { title: 'The Unified Decision Protocol', body: 'Practice:\n\nChoose one decision you have been circling.\n\nRun each brain:\n◰ Facts only — what do I know for certain?\n◱ Gut signal — what does my instinct say, independent of logic?\n◲ Connections — what alternative frame or option have I not fully considered?\n◳ Reflection — what does my hesitation reveal about my values or assumptions?\n\nWrite one synthesis sentence: "Based on the integration of all four cognitive inputs, my position is: ____"\n\nActivate the Commitment Lock. Take one action within 10 minutes. Clarity becomes real through action — not more thinking.' },
      ]},
      4: { pages: [
        { title: 'Why Cognition Collapses Under Pressure', body: 'Pressure activates the threat-detection system of the brain — which prioritizes speed over accuracy, emotion over analysis, and habit over deliberation.\n\nThe cognitive result:\n· One brain dominates completely (usually Intuitive under fear)\n· All other modes go offline\n· Fragmented output masquerades as decision-making\n· Regret follows\n\nNeuralFusion™ does not remove pressure. It trains the nervous system to maintain multi-brain integration while under it. Pressure is not the enemy. Fragmentation is.' },
        { title: 'The Three Cognitive Stabilizers', body: '1. COGNITIVE ANCHOR\nA short internal declaration that grounds the synthesis.\nExamples: "I have already processed this." / "My analysis is complete."\nThis prevents the Analytical Brain from reopening resolved questions.\n\n2. TEMPORAL COMPRESSION\nPressure distorts time perception. Reduce the frame: "What matters in the next 10 minutes?"\nThis collapses decision space to what is actionable and immediate.\n\n3. DOMINANT MODE REGULATION\nIdentify which brain has hijacked the process. Name it. Consciously reduce its influence. This is not suppression — it is recalibration.\n\nAll three can be deployed in under 30 seconds.' },
        { title: 'High-Pressure Stabilization Drill', body: 'Exercise: Pressure Integration Training (10 minutes)\n\n1. Recall a recent high-pressure moment where your thinking fragmented\n2. Identify the dominant brain at the time\n3. Replay the situation — this time deploying all four brains:\n   · What were the verifiable facts? (Analytical)\n   · What was your gut signaling that you may have overridden? (Intuitive)\n   · What alternative response existed? (Associative)\n   · What did the moment reveal about your default patterns? (Reflective)\n4. Write a one-sentence stabilized synthesis\n5. Notice: the pressure does not change — only the integration quality does\n\nRepeat this drill with increasing pressure scenarios weekly.' },
        { title: 'Long-Term Pressure Immunity', body: 'Cognitive pressure immunity is not built through motivation. It is built through repetition.\n\nThe stabilization protocol must become reflexive — deployed automatically before conscious choice is required.\n\nSigns of developing immunity:\n· Noticing brain fragmentation as it begins rather than after it happens\n· Deploying anchors automatically in conflict\n· Feeling the pressure but maintaining integrated cognition\n· Recovering to synthesis 40-60% faster than baseline\n\nThis is the training objective of Lesson Four. It is not a mindset shift — it is a neurological upgrade through structured practice.\n\nYou cannot think your way to pressure immunity. You must practice your way there.' },
      ]},
      5: { pages: [
        { title: 'The Definition of Cognitive Fluency', body: 'Cognitive Fluency is the state in which integrated four-brain thinking becomes automatic.\n\nIt is not about thinking harder. It is not about thinking faster. It is about thinking without friction — where the Core Loop activates below conscious awareness, where synthesis happens before deliberate effort begins.\n\nElite performers in every domain share one cognitive signature: they do not appear to think. They appear to know. This is not magic. It is fluency — the end state of structured cognitive training.\n\nNeuralFusion™ Lesson Five initiates the installation of this state.' },
        { title: 'From Deliberate to Automatic', body: 'All cognitive skills pass through the same developmental arc:\n\nSTAGE 1 — CONSCIOUS INCOMPETENCE\nYou do not know that your thinking is fragmented.\n\nSTAGE 2 — CONSCIOUS COMPETENCE\nYou deliberately apply the four-brain protocol.\n\nSTAGE 3 — AUTOMATIC COMPETENCE\nThe integration happens without deliberate activation.\n\nSTAGE 4 — COGNITIVE FLUENCY\nThe system runs so smoothly you forget it was ever trained.\n\nLessons 1–4 built Stage 2. This lesson initiates Stage 3–4.' },
        { title: 'The One-Word Activation Protocol', body: 'Cognitive fluency is anchored by a single internal trigger word: FUSE\n\nThis word, when used consistently, becomes a neural shortcut that activates:\n· Automatic decomposition\n· Relevant brain mode activation\n· Rapid synthesis\n· Instant stabilization\n\nInstallation process:\n1. Use the word internally before every decision, conversation, or challenge — regardless of size\n2. The first 21 days are deliberate (Stage 2)\n3. By day 28–35, activation begins to precede the conscious choice\n4. By day 42–60, fluency installs\n\nOne word. Consistent application. Permanent upgrade.' },
        { title: 'Cognitive Fluency Maintenance', body: 'You have completed NeuralFusion™ Core Training.\n\nWhat you now have:\n· Conceptual knowledge of the Four Brains Framework\n· Deliberate activation ability for all four cognitive modes\n· Integration and synthesis protocols\n· Pressure stabilization tools\n· The FUSE trigger for automatic deployment\n\nWhat maintenance looks like:\n· Daily FUSE activation on at least three real situations\n· Weekly CFI self-assessment to monitor fragmentation levels\n· Monthly reflection on cognitive growth patterns\n· Ongoing engagement with Cognitive Labs for advanced training\n\nThe platform continues to evolve. So should you.' },

    // ── PROGRESS RING ─────────────────────────────────────────────────
    function ProgressRing({ value=70, size=80, color='#C4A050', label='' }) {
      const r = (size-8)/2;
      const circ = 2*Math.PI*r;
      const dash = (value/100)*circ;
      return (
        <div style={{ position:'relative', width:size, height:size, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <svg width={size} height={size} style={{position:'absolute', transform:'rotate(-90deg)'}}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`${color}15`} strokeWidth={2} />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={2}
              strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
              style={{ transition:'stroke-dasharray 1s ease' }} />
          </svg>
          <div style={{ textAlign:'center' }}>
            <div style={{ ...syne, fontSize:size/5, fontWeight:800, color }}>{value}%</div>
            {label && <div style={{ ...mono, fontSize:7, letterSpacing:2, color:C.muted, marginTop:2 }}>{label}</div>}
          </div>
        </div>
      );
    }

    // ── AUTH MODAL ────────────────────────────────────────────────────
    function AuthModal({ onClose, onSuccess, initialTab = 'login' }) {
      const [tab, setTab] = useState(initialTab);
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [name, setName] = useState('');
      const [loading, setLoading] = useState(false);
      const [msg, setMsg] = useState({ text:'', type:'' });

      // Sync if parent changes initialTab (e.g. PASSWORD_RECOVERY fires after mount)
      useEffect(() => { setTab(initialTab); }, [initialTab]);

      const handleLogin = async () => {
        if (!email || !password) { setMsg({text:'Email and password required.',type:'error'}); return; }
        setLoading(true); setMsg({text:'',type:''});
        const { error } = await sb.auth.signInWithPassword({ email, password });
        setLoading(false);
        if (error) setMsg({text:error.message,type:'error'});
        else { onSuccess(); onClose(); }
      };

      const handleSignup = async () => {
        if (!email||!password||!name) { setMsg({text:'All fields required.',type:'error'}); return; }
        if (password.length<6) { setMsg({text:'Password must be at least 6 characters.',type:'error'}); return; }
        setLoading(true); setMsg({text:'',type:''});
        try {
          // Step 1: Create auth user
          const { data, error } = await sb.auth.signUp({
            email: email.trim().toLowerCase(),
            password,
            options:{ data:{ full_name: name.trim() } }
          });
          if (error) {
            setLoading(false);
            setMsg({text: `Auth error: ${error.message} (status: ${error.status})`, type:'error'});
            return;
          }

          // Step 2: Sign in immediately
          const { data: signInData, error: signInError } = await sb.auth.signInWithPassword({
            email: email.trim().toLowerCase(),
            password
          });

          if (signInError) {
            setLoading(false);
            setMsg({text:'Account created! Check your email to confirm, then sign in.', type:'success'});
            return;
          }

          // Step 3: Manually upsert profile — safety net if DB trigger didn't fire
          const uid = signInData?.user?.id || data?.user?.id;
          if (uid) {
            const { error: profileError } = await sb.from('profiles')
              .upsert({ id: uid, full_name: name.trim(), is_pro: false }, { onConflict: 'id' });
            if (profileError) {
              setLoading(false);
              setMsg({text: `Profile error: ${profileError.message} (code: ${profileError.code})`, type:'error'});
              return;
            }
          }

          setLoading(false);
          onSuccess();
          onClose();
        } catch(err) {
          setLoading(false);
          setMsg({text: err.message || 'Unexpected error. Try again.', type:'error'});
        }
      };

      const handleForgotPassword = async () => {
        if (!email) { setMsg({text:'Please enter your email address.',type:'error'}); return; }
        setLoading(true); setMsg({text:'',type:''});
        const { error } = await sb.auth.resetPasswordForEmail(email.trim().toLowerCase(), {
          redirectTo: window.location.href,
        });
        setLoading(false);
        if (error) setMsg({text:error.message,type:'error'});
        else setMsg({text:'Reset link sent! Check your inbox and follow the link to set a new password.', type:'success'});
      };

      const handleUpdatePassword = async () => {
        if (!password) { setMsg({text:'New password is required.',type:'error'}); return; }
        if (password.length < 6) { setMsg({text:'Password must be at least 6 characters.',type:'error'}); return; }
        if (password !== confirmPassword) { setMsg({text:'Passwords do not match.',type:'error'}); return; }
        setLoading(true); setMsg({text:'',type:''});
        const { error } = await sb.auth.updateUser({ password });
        setLoading(false);
        if (error) setMsg({text:error.message,type:'error'});
        else {
          setMsg({text:'Password updated successfully! You are now signed in.', type:'success'});
          setTimeout(()=>{ onSuccess(); onClose(); }, 1500);
        }
      };

      const tabMeta = {
        login:           { title:'Access Your System',      sub:'Enter credentials to resume cognitive training.' },
        signup:          { title:'Initialize Profile',       sub:'Create your cognitive profile to begin.' },
        'forgot-password':{ title:'Reset Password',          sub:'Enter your email to receive a reset link.' },
        'update-password':{ title:'Set New Password',        sub:'Choose a strong new password for your account.' },
      };

      const { title, sub } = tabMeta[tab] || tabMeta.login;

      return (
        <div style={{
          position:'fixed', inset:0, background:'rgba(5,12,26,0.95)', zIndex:1000,
          display:'flex', alignItems:'center', justifyContent:'center', padding:20,
          backdropFilter:'blur(8px)',
        }}>
          <div className="card fade-up" style={{ maxWidth:420, width:'100%', padding:'36px 32px', position:'relative' }}>
            <button onClick={onClose} style={{ position:'absolute', top:16, right:16, background:'none', border:'none', color:C.muted, fontSize:20, cursor:'pointer', lineHeight:1 }}>×</button>

            <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:20 }}>COGNITIVE OS · AUTHENTICATION</div>
            <div style={{ ...syne, fontSize:24, fontWeight:800, color:C.text, marginBottom:6 }}>{title}</div>
            <div style={{ fontSize:13, color:C.muted, marginBottom:28 }}>{sub}</div>

            {/* Tab bar — only show for login/signup */}
            {(tab==='login'||tab==='signup') && (
              <div style={{ display:'flex', gap:2, marginBottom:24, background:C.deep, padding:4, borderRadius:2 }}>
                {['login','signup'].map(t=>(
                  <button key={t} onClick={()=>{ setTab(t); setMsg({text:'',type:''}); }} style={{
                    flex:1, padding:'10px', background:tab===t?C.cyan:'transparent',
                    color:tab===t?C.void:C.muted, ...syne, fontSize:11, fontWeight:700,
                    letterSpacing:1, borderRadius:2, border:'none', textTransform:'uppercase', cursor:'pointer',
                  }}>
                    {t==='login'?'Sign In':'Register'}
                  </button>
                ))}
              </div>
            )}

            {/* ── LOGIN FIELDS ── */}
            {tab==='login' && (<>
              <div style={{ marginBottom:14 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>EMAIL ADDRESS</div>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
              </div>
              <div style={{ marginBottom:8 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>PASSWORD</div>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"
                  onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
              </div>
              {/* Forgot password link */}
              <div style={{ textAlign:'right', marginBottom:20 }}>
                <button onClick={()=>{ setTab('forgot-password'); setMsg({text:'',type:''}); }} style={{
                  background:'none', border:'none', ...mono, fontSize:9, letterSpacing:1,
                  color:C.muted, cursor:'pointer', textDecoration:'underline',
                }}>Forgot password?</button>
              </div>
            </>)}

            {/* ── SIGNUP FIELDS ── */}
            {tab==='signup' && (<>
              <div style={{ marginBottom:14 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>FULL NAME</div>
                <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" />
              </div>
              <div style={{ marginBottom:14 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>EMAIL ADDRESS</div>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
              </div>
              <div style={{ marginBottom:24 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>PASSWORD</div>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"
                  onKeyDown={e=>e.key==='Enter'&&handleSignup()} />
              </div>
            </>)}

            {/* ── FORGOT PASSWORD FIELDS ── */}
            {tab==='forgot-password' && (<>
              <div style={{ marginBottom:24 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>EMAIL ADDRESS</div>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"
                  onKeyDown={e=>e.key==='Enter'&&handleForgotPassword()} />
              </div>
            </>)}

            {/* ── UPDATE PASSWORD FIELDS ── */}
            {tab==='update-password' && (<>
              <div style={{ marginBottom:14 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>NEW PASSWORD</div>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" />
              </div>
              <div style={{ marginBottom:24 }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>CONFIRM PASSWORD</div>
                <input type="password" value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} placeholder="••••••••"
                  onKeyDown={e=>e.key==='Enter'&&handleUpdatePassword()} />
              </div>
            </>)}

            {/* Message */}
            {msg.text && (
              <div style={{ marginBottom:20, padding:'12px 16px', background:msg.type==='error'?'rgba(248,113,113,0.1)':'rgba(128,203,196,0.1)',
                border:`1px solid ${msg.type==='error'?'#F8717144':'#7AAFCF44'}`, borderRadius:2,
                color:msg.type==='error'?'#F87171':'#7AAFCF', fontSize:13 }}>
                {msg.text}
              </div>
            )}

            {/* Primary action button */}
            <button className="btn-primary" style={{ width:'100%', fontSize:12, opacity:loading?0.6:1 }} disabled={loading}
              onClick={
                tab==='login'            ? handleLogin :
                tab==='signup'           ? handleSignup :
                tab==='forgot-password'  ? handleForgotPassword :
                                           handleUpdatePassword
              }>
              {loading ? 'Processing...' : (
                tab==='login'            ? 'Access System →' :
                tab==='signup'           ? 'Initialize Profile →' :
                tab==='forgot-password'  ? 'Send Reset Link →' :
                                           'Update Password →'
              )}
            </button>

            {/* Back to sign in link */}
            {(tab==='forgot-password'||tab==='update-password') && (
              <div style={{ textAlign:'center', marginTop:16 }}>
                <button onClick={()=>{ setTab('login'); setMsg({text:'',type:''}); setPassword(''); setConfirmPassword(''); }} style={{
                  background:'none', border:'none', ...mono, fontSize:9, letterSpacing:1,
                  color:C.muted, cursor:'pointer', textDecoration:'underline',
                }}>← Back to Sign In</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    //  CFI ASSESSMENT VIEW
    // ═══════════════════════════════════════════════════════════════════
    function CFIView({ setView, user, setShowAuth, cfiResult, setCfiResult }) {
      const [started, setStarted] = useState(false);
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState({});
      const [showResult, setShowResult] = useState(!!cfiResult);

      const labels = ['Never','Rarely','Sometimes','Often','Always'];
      const progress = started ? (step/CFI_ITEMS.length)*100 : 0;

      const calculateCFI = () => {
        const vals = Object.values(answers);
        if (vals.length < CFI_ITEMS.length) return null;
        const total = vals.reduce((a,b)=>a+b,0);
        let band, desc, recommendation;
        if (total<=20) {
          band='Integrated'; desc='Low Cognitive Fragmentation. Your thinking modes are well-coordinated.';
          recommendation='Maintain daily integration protocol. Advance to Lessons 4–5 for fluency installation.';
        } else if (total<=33) {
          band='Moderate Fragmentation'; desc='Some fragmentation detected. Specific modes need targeted training.';
          recommendation='Focus on Mode Activation training (Lesson 2). Daily mode-switching drills for 14 days.';
        } else if (total<=46) {
          band='High Fragmentation'; desc='Significant cognitive fragmentation. Integration is inconsistent under pressure.';
          recommendation='Begin full Core Loop training from Lesson 1. Run the integration protocol daily.';
        } else {
          band='Critical Fragmentation'; desc='Severe fragmentation. Decision-making and clarity are significantly compromised.';
          recommendation='Intensive intervention required. Begin Lesson 1 immediately and track CFI weekly.';
        }
        const dims={A:[],I:[],S:[],R:[],E:[]};
        CFI_ITEMS.forEach(item=>{ if(answers[item.id]) dims[item.dim].push(answers[item.id]); });
        const dimScores={};
        Object.keys(dims).forEach(d=>{ dimScores[d]=dims[d].length ? Math.round(dims[d].reduce((a,b)=>a+b,0)/dims[d].length*20) : 0; });

        // Determine dominant brain from highest dim score (meaning highest fragmentation)
        const brainMap = { A:'analytical', I:'intuitive', S:'associative', R:'reflective', E:'analytical' };
        const sortedDims = Object.entries(dimScores).sort((a,b)=>b[1]-a[1]);
        const dominantBrain = brainMap[sortedDims[0][0]] || 'analytical';

        return { total, band, desc, recommendation, dimScores, dominantBrain };
      };

      const handleAnswer = (val) => {
        const newAnswers = {...answers, [CFI_ITEMS[step].id]: val};
        setAnswers(newAnswers);
        if (step < CFI_ITEMS.length-1) {
          setStep(s=>s+1);
        } else {
          // Calculate result
          const tempAnswers = newAnswers;
          const vals = Object.values(tempAnswers);
          const total = vals.reduce((a,b)=>a+b,0);
          let band, desc, recommendation;
          if (total<=20) { band='Integrated'; desc='Low Cognitive Fragmentation. Your thinking modes are well-coordinated.'; recommendation='Maintain daily integration protocol. Advance to Lessons 4–5 for fluency installation.'; }
          else if (total<=33) { band='Moderate Fragmentation'; desc='Some fragmentation detected. Specific modes need targeted training.'; recommendation='Focus on Mode Activation training (Lesson 2). Daily mode-switching drills for 14 days.'; }
          else if (total<=46) { band='High Fragmentation'; desc='Significant cognitive fragmentation. Integration is inconsistent under pressure.'; recommendation='Begin full Core Loop training from Lesson 1. Run the integration protocol daily.'; }
          else { band='Critical Fragmentation'; desc='Severe fragmentation. Decision-making and clarity are significantly compromised.'; recommendation='Intensive intervention required. Begin Lesson 1 immediately and track CFI weekly.'; }
          const dims={A:[],I:[],S:[],R:[],E:[]};
          CFI_ITEMS.forEach(item=>{ if(tempAnswers[item.id]) dims[item.dim].push(tempAnswers[item.id]); });
          const dimScores={};
          Object.keys(dims).forEach(d=>{ dimScores[d]=dims[d].length ? Math.round(dims[d].reduce((a,b)=>a+b,0)/dims[d].length*20) : 0; });
          const brainMap = { A:'analytical', I:'intuitive', S:'associative', R:'reflective', E:'analytical' };
          const sortedDims = Object.entries(dimScores).sort((a,b)=>b[1]-a[1]);
          const dominantBrain = brainMap[sortedDims[0][0]] || 'analytical';
          const result = { total, band, desc, recommendation, dimScores, dominantBrain };
          setCfiResult(result);
          setShowResult(true);
          if (user) saveCFIResult(user.id, result, tempAnswers);
        }
      };

      if (showResult && cfiResult) {
        const bandColors = {
          'Integrated':'#7AAFCF',
          'Moderate Fragmentation':'#C4A050',
          'High Fragmentation':'#FB8C00',
          'Critical Fragmentation':'#F87171',
        };
        const bandColor = bandColors[cfiResult.band] || C.cyan;
        const dimLabels = {A:'Analytical Coherence',I:'Intuitive Alignment',S:'Associative Flexibility',R:'Reflective Depth',E:'Integration Stability'};

        return (
          <div style={{ paddingTop:80, paddingBottom:40 }}>
            <div style={{ maxWidth:900, margin:'0 auto', padding:'24px 24px' }}>
              <div style={{ ...mono, fontSize:9, letterSpacing:4, color:C.cyan, marginBottom:16 }}>CFI ASSESSMENT · RESULTS</div>

              {/* Score hero */}
              <div className="card" style={{ padding:'40px', marginBottom:32, position:'relative', overflow:'hidden', borderColor:`${bandColor}22` }}>
                <ScanLine />
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(min(200px, 100%), 1fr))', gap:32, alignItems:'center' }}>
                  <div>
                    <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.muted, marginBottom:12 }}>COGNITIVE FRAGMENTATION INDEX</div>
                    <div style={{ ...syne, fontSize:56, fontWeight:800, color:bandColor, lineHeight:1 }}>{cfiResult.total}</div>
                    <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.muted, marginTop:8, marginBottom:16 }}>TOTAL FRAGMENTATION SCORE</div>
                    <div style={{ display:'inline-block', padding:'8px 16px', background:`${bandColor}15`, border:`1px solid ${bandColor}33`, borderRadius:2 }}>
                      <div style={{ ...syne, fontSize:16, fontWeight:800, color:bandColor }}>{cfiResult.band}</div>
                    </div>
                  </div>
                  <div>
                    <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.muted, marginBottom:16 }}>DOMINANT COGNITIVE PATTERN</div>
                    <BrainCard brainKey={cfiResult.dominantBrain} compact />
                  </div>
                </div>
                <div style={{ marginTop:32, padding:'20px', background:C.deep, borderRadius:2, border:`1px solid ${C.border}` }}>
                  <div style={{ ...mono, fontSize:8, letterSpacing:3, color:C.muted, marginBottom:8 }}>DIAGNOSTIC SUMMARY</div>
                  <div style={{ fontSize:14, color:C.text, lineHeight:1.7, marginBottom:12 }}>{cfiResult.desc}</div>
                  <div style={{ ...mono, fontSize:8, letterSpacing:3, color:C.cyan, marginBottom:8 }}>TRAINING RECOMMENDATION</div>
                  <div style={{ fontSize:13, color:C.muted, lineHeight:1.7 }}>{cfiResult.recommendation}</div>
                </div>
              </div>

              {/* Dimensional analysis */}
              <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:20 }}>DIMENSIONAL ANALYSIS</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(min(250px, 100%), 1fr))', gap:16, marginBottom:32 }}>
                {Object.entries(cfiResult.dimScores).map(([dim,score])=>{
                  const col = score>=70?'#F87171':score>=50?'#C4A050':'#7AAFCF';
                  return (
                    <div key={dim} className="card" style={{ padding:'24px' }}>
                      <div style={{ ...mono, fontSize:8, letterSpacing:3, color:C.muted, marginBottom:12 }}>{dimLabels[dim]}</div>
                      <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:12 }}>
                        <div style={{ ...syne, fontSize:28, fontWeight:800, color:col }}>{score}</div>
                        <div style={{ fontSize:11, color:C.muted }}>fragmentation<br />score</div>
                      </div>
                      <div style={{ height:3, background:C.panel, borderRadius:2 }}>
                        <div style={{ width:`${score}%`, height:'100%', background:col, borderRadius:2 }} />
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{ display:'flex', gap:16, flexWrap:'wrap' }}>
                <button className="btn-primary" onClick={()=>setView('training')}>Begin Training Protocol →</button>
                <button className="btn-outline" onClick={()=>setView('lessons')}>Open Lesson Manuals</button>
                <button className="btn-ghost" onClick={()=>{ setStarted(false); setStep(0); setAnswers({}); setShowResult(false); }}>Retake Assessment</button>
              </div>
            </div>
          </div>
        );
      }

      if (!started) {
        return (
          <div style={{ paddingTop:80, paddingBottom:40 }}>
            <div style={{ maxWidth:800, margin:'0 auto', padding:'32px 24px', textAlign:'center' }}>
              <div style={{ ...mono, fontSize:9, letterSpacing:4, color:C.cyan, marginBottom:20 }}>COGNITIVE FRAGMENTATION INDEX™</div>
              <h1 style={{ ...syne, fontSize:32, fontWeight:800, color:C.text, marginBottom:20, lineHeight:1.05 }}>
                Measure your cognitive<br /><span style={{color:C.cyan}}>fragmentation level</span>
              </h1>
              <p style={{ fontSize:15, color:C.muted, lineHeight:1.8, marginBottom:40, maxWidth:520, margin:'0 auto 40px' }}>
                The CFI™ is a precision diagnostic instrument that measures fragmentation across
                five cognitive dimensions. The assessment consists of {CFI_ITEMS.length} statements.
                Respond honestly — the accuracy of your profile depends on it.
              </p>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(min(200px, 100%), 1fr))', gap:16, marginBottom:48, textAlign:'left' }}>
                {['Five cognitive dimensions measured','Dominant brain mode identified','Fragmentation band assigned','Personalized training recommendation generated'].map((item,i)=>(
                  <div key={i} className="card" style={{ padding:'16px 20px', display:'flex', alignItems:'center', gap:12 }}>
                    <div style={{ ...mono, fontSize:14, color:C.cyan }}>◈</div>
                    <div style={{ fontSize:13, color:C.muted }}>{item}</div>
                  </div>
                ))}
              </div>
              <button className="btn-primary" style={{ fontSize:14 }} onClick={()=>setStarted(true)}>
                Begin CFI Assessment →
              </button>
            </div>
          </div>
        );
      }

      const item = CFI_ITEMS[step];
      const brainInfo = C.brains[item.brain] || C.brains.analytical;

      return (
        <div style={{ paddingTop:80, paddingBottom:40 }}>
          <div style={{ maxWidth:700, margin:'0 auto', padding:'40px 24px', width:'100%' }}>
            {/* Progress */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:32 }}>
              <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.muted }}>CFI ASSESSMENT · {step+1} / {CFI_ITEMS.length}</div>
              <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan }}>{Math.round(progress)}%</div>
            </div>
            <div style={{ height:2, background:C.panel, borderRadius:2, marginBottom:48, overflow:'hidden' }}>
              <div style={{ width:`${progress}%`, height:'100%', background:C.cyan, borderRadius:2, transition:'width 0.4s ease' }} />
            </div>

            {/* Question */}
            <div key={step} style={{ animation:'fadeUp 0.4s ease both' }}>
              <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:24 }}>
                <div style={{ ...mono, fontSize:18, color:brainInfo.color }}>{brainInfo.symbol}</div>
                <div style={{ ...mono, fontSize:9, letterSpacing:3, color:brainInfo.color }}>
                  {FOUR_BRAINS[item.brain]?.label || 'COGNITIVE'}
                </div>
              </div>
              <div style={{ ...syne, fontSize:20, fontWeight:700, color:C.text, lineHeight:1.3, marginBottom:48 }}>
                "{item.text}"
              </div>

              {/* Answer scale */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:8 }}>
                {labels.map((label,i)=>{
                  const val = i+1;
                  const isSelected = answers[item.id]===val;
                  return (
                    <button key={i} onClick={()=>handleAnswer(val)} style={{
                      padding:'16px 8px', borderRadius:2, border:`1px solid ${isSelected?C.cyan:C.border}`,
                      background: isSelected ? `${C.cyan}20` : C.surface,
                      display:'flex', flexDirection:'column', alignItems:'center', gap:8,
                      transition:'all 0.2s', cursor:'pointer',
                    }}>
                      <div style={{ ...syne, fontSize:20, fontWeight:800, color:isSelected?C.cyan:C.dim }}>{val}</div>
                      <div style={{ ...mono, fontSize:8, letterSpacing:1, color:isSelected?C.cyan:C.dim, textAlign:'center' }}>{label}</div>
                    </button>
                  );
                })}
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', marginTop:12 }}>
                <div style={{ ...mono, fontSize:8, letterSpacing:2, color:C.dim }}>NEVER</div>
                <div style={{ ...mono, fontSize:8, letterSpacing:2, color:C.dim }}>ALWAYS</div>
              </div>
            </div>

            {step > 0 && (
              <button className="btn-ghost" style={{ marginTop:32 }} onClick={()=>setStep(s=>s-1)}>← Previous</button>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    //  TRAINING VIEW
    // ═══════════════════════════════════════════════════════════════════
    function TrainingView({ setView, user, setShowAuth, sessions, setSessions }) {
      const [activeModule, setActiveModule] = useState(null);
      const [trainingStep, setTrainingStep] = useState(0);
      const [inputs, setInputs] = useState({});

      const modules = [
        {
          id:'core-loop', title:'Core Integration Loop', duration:'8 min', difficulty:'Foundation',
          color:C.cyan, brain:'all', icon:'◈',
          desc:'The primary NeuralFusion™ protocol. Run all four brains in sequence on a real situation.',
          steps:[
            { brain:'analytical', label:'◰ DECOMPOSE', prompt:'State the situation as pure fact.', detail:'No interpretation, no emotion, no judgment. Just the verifiable structure of what is happening.', placeholder:'What are the concrete facts here? List them.' },
            { brain:'intuitive', label:'◱ SENSE', prompt:'What does your gut signal?', detail:'Before logic arrives, what does your body and instinct know? Trust the first signal — do not edit it.', placeholder:'My gut is telling me...' },
            { brain:'associative', label:'◲ EXPAND', prompt:'What connections exist that you have not explored?', detail:'Think laterally. What does this remind you of? What alternative frame exists? What have you not considered?', placeholder:'This connects to... / An alternative view is...' },
            { brain:'reflective', label:'◳ REFLECT', prompt:'What does your own thinking reveal?', detail:'What assumption is operating beneath the surface? What pattern are you repeating? What does your hesitation tell you?', placeholder:'My thinking reveals...' },
            { brain:'synthesis', label:'◈ FUSE', prompt:'Write your integrated position.', detail:'One sentence that synthesizes all four brain outputs into a unified cognitive stance. Activate the Commitment Lock.', placeholder:'My fused position is: ...' },
          ]
        },
        {
          id:'pressure-drill', title:'Pressure Stabilization Drill', duration:'10 min', difficulty:'Advanced',
          color:'#E2BE78', brain:'reflective', icon:'◱',
          desc:'Train cognitive stability under simulated pressure conditions.',
          steps:[
            { brain:'reflective', label:'◳ IDENTIFY PRESSURE', prompt:'Name the pressure source precisely.', detail:'What exactly is creating the pressure? Be specific — vague pressure is more destabilizing than named pressure.', placeholder:'The specific pressure is...' },
            { brain:'analytical', label:'◰ FACT-ONLY ASSESSMENT', prompt:'List only verifiable facts about this situation.', detail:'Strip all interpretation. What can you prove? What is objectively true regardless of how it feels?', placeholder:'Facts only:' },
            { brain:'intuitive', label:'◱ SIGNAL CHECK', prompt:'What is your intuition saying beneath the pressure?', detail:'Separate the fear signal from the intelligence signal. What does your pattern recognition tell you, absent the adrenaline?', placeholder:'My signal, separate from the fear, is...' },
            { brain:'associative', label:'◲ ALTERNATIVE RESPONSE', prompt:'What response exists that you have not yet considered?', detail:'Under pressure, the mind narrows to one option. Force it to generate at least two others.', placeholder:'Alternative responses: 1) ... 2) ... 3)...' },
            { brain:'synthesis', label:'◈ STABILIZE', prompt:'Your stabilized cognitive position.', detail:'After running all four brains under simulated pressure — what is your clear, stable position? Name it. Lock it.', placeholder:'Stabilized position:' },
          ]
        },
        {
          id:'decision-architecture', title:'Decision Architecture Protocol', duration:'12 min', difficulty:'Intermediate',
          color:'#7AAFCF', brain:'analytical', icon:'◰',
          desc:'Build a complete cognitive architecture for any complex decision.',
          steps:[
            { brain:'analytical', label:'◰ DEFINE', prompt:'Define the decision with precision.', detail:'What exactly is being decided? What are the specific options? What is the timeline? What resources are involved?', placeholder:'The decision I am making is...' },
            { brain:'reflective', label:'◳ VALUES CHECK', prompt:'What do your core values say about this?', detail:'Which option is most aligned with who you are and who you want to become? Values-misaligned decisions fail over time.', placeholder:'My values indicate...' },
            { brain:'intuitive', label:'◱ PATTERN READ', prompt:'What pattern does your experience reveal?', detail:'Have you been here before? What happened? What does your accumulated experience — not hope — tell you?', placeholder:'My experience pattern says...' },
            { brain:'associative', label:'◲ SECOND-ORDER EFFECTS', prompt:'What are the downstream consequences?', detail:'Think two moves ahead. What does each option create? What does it close off? What unexpected connections exist?', placeholder:'Second-order effects:' },

          const session = {
            id: Date.now(),
            title: mod.title,
            date: 'Just now',

        const handleComplete = () => {
          const updated = {...lessonProgress, [activeLesson]:100};

          setPage(0);

              <div key={`${activeLesson}-${page}`} style={{ animation:'fadeUp 0.4s ease both' }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:3, color:col, marginBottom:12 }}>LESSON {activeLesson} · {lesson.level.toUpperCase()}</div>
                <h1 style={{ ...syne, fontSize:24, fontWeight:800, color:C.text, marginBottom:32, lineHeight:1.1 }}>

                    }}>{para}</p>

                <div style={{ display:'flex', justifyContent:'space-between', marginTop:32, alignItems:'center' }}>
                  <button className="btn-ghost" disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{ opacity:page===0?0.3:1 }}>← Previous</button>

                        <div style={{ width:`${prog}%`, height:'100%', background:col, borderRadius:2 }} />

            </div>

            {!isPro && (
              <div className="card" style={{ marginTop:40, padding:'40px', textAlign:'center', borderColor:`${C.cyan}22` }}>
                <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:16 }}>UNLOCK ALL LESSONS</div>
                <div style={{ ...syne, fontSize:24, fontWeight:800, color:C.text, marginBottom:8 }}>Pro Access</div>
                <div style={{ ...mono, fontSize:28, fontWeight:800, color:C.cyan, marginBottom:16 }}>₦{(proPrice/100).toLocaleString()}</div>
                <div style={{ fontSize:14, color:C.muted, marginBottom:32, maxWidth:400, margin:'0 auto 32px' }}>

                </div>
                <button className="btn-primary" onClick={()=>{
                  if (!user) { setShowAuth(true); return; }
                  const handler = PaystackPop.setup({
                    key: 'pk_live_dfa71eca29f942cadc337cb8e41834857e2b129b',
                    email: user.email,
                    amount: proPrice,
                    currency: 'NGN',
                    ref: 'NF_' + Date.now() + '_' + user.id.slice(0,8),
                    metadata: { user_id: user.id, product: 'neuralfusion_pro' },
                    onSuccess: async (transaction) => {
                      await upsertProfile(user.id, { is_pro: true });

                    },
                    onCancel: () => {},
                  });
                  handler.openIframe();
                }}>Upgrade to Pro — ₦{(proPrice/100).toLocaleString()} →</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    //  ADMIN PORTAL
    // ═══════════════════════════════════════════════════════════════════
    function AdminView({ user, setView, onPriceChange }) {
      const [unlocked, setUnlocked] = useState(false);
      const [pin, setPin]           = useState('');
      const [pinError, setPinError] = useState('');
      const [tab, setTab]           = useState('overview');

      // Data
      const [users,      setUsers]      = useState([]);
      const [cfiData,    setCfiData]    = useState([]);
      const [loading,    setLoading]    = useState(false);
      const [actionMsg,  setActionMsg]  = useState('');

      // Pricing
      const [proPrice,    setProPrice]    = useState(() => parseInt(localStorage.getItem('nf_pro_price') || '600000'));
      const [priceInput,  setPriceInput]  = useState(() => String(parseInt(localStorage.getItem('nf_pro_price') || '600000') / 100));
      const [priceSaved,  setPriceSaved]  = useState(false);

      // Users search / filter
      const [userSearch, setUserSearch] = useState('');
      const [proFilter,  setProFilter]  = useState('all'); // all | pro | free

      // CFI filter
      const [cfiFilter, setCfiFilter] = useState('all');

      // Settings toggles
      const [maintenanceMode, setMaintenanceMode] = useState(false);

      const handlePinSubmit = () => {
        if (pin === ADMIN_PIN) {
          setUnlocked(true);
          setPinError('');
          loadAdminData();
        } else {
          setPinError('Incorrect PIN. Access denied.');
          setPin('');
        }
      };

      const loadAdminData = async () => {
        setLoading(true);
        try {
          const [usersRes, cfiRes] = await Promise.all([
            sb.from('profiles').select('*').order('created_at', { ascending: false }),
            sb.from('cfi_results').select('*').order('created_at', { ascending: false }),
          ]);
          setUsers(usersRes.data  || []);
          setCfiData(cfiRes.data  || []);

          // Try platform_settings for price
          try {
            const { data: s } = await sb.from('platform_settings').select('*').eq('key','pro_price').maybeSingle();
            if (s?.value) { setProPrice(s.value); setPriceInput(String(s.value/100)); }
          } catch(_) {}
        } catch(e) { setActionMsg('Error loading data: ' + e.message); }
        setLoading(false);
      };

      const togglePro = async (uid, current) => {
        const { error } = await sb.from('profiles').update({ is_pro: !current }).eq('id', uid);
        if (!error) {
          setUsers(u => u.map(x => x.id === uid ? {...x, is_pro: !current} : x));
          setActionMsg(`Pro status ${!current ? 'granted' : 'revoked'}.`);
          setTimeout(() => setActionMsg(''), 3000);
        }
      };

      const savePrice = async () => {
        const raw = parseFloat(priceInput);
        if (isNaN(raw) || raw < 100) { setActionMsg('Enter a valid price (minimum ₦100).'); return; }
        const kobo = Math.round(raw * 100);
        localStorage.setItem('nf_pro_price', kobo.toString());
        setProPrice(kobo);
        if (onPriceChange) onPriceChange(kobo);
        try {
          await sb.from('platform_settings').upsert({ key:'pro_price', value:kobo }, { onConflict:'key' });
        } catch(_) {}
        setPriceSaved(true);
        setTimeout(() => setPriceSaved(false), 3000);
      };

      const deleteCFIResult = async (id) => {
        const { error } = await sb.from('cfi_results').delete().eq('id', id);
        if (!error) {
          setCfiData(d => d.filter(x => x.id !== id));
          setActionMsg('CFI result deleted.');
          setTimeout(() => setActionMsg(''), 3000);
        }
      };

      /* ── PIN GATE ── */

            <div style={{ ...mono, fontSize:40, color:C.cyan, marginBottom:20, animation:'neuralPulse 2.5s ease-in-out infinite' }}>◈</div>

            <div style={{ fontSize:13, color:C.muted, marginBottom:32, lineHeight:1.6 }}>Enter your admin PIN to unlock the control dashboard.</div>
            <input
              type="password"
              value={pin}
              onChange={e => setPin(e.target.value)}

                    </div>

                    <div className="card" style={{ overflow:'hidden' }}>
                      <div style={{ display:'grid', gridTemplateColumns:'1.5fr 80px 160px 120px 100px 80px', gap:12, padding:'14px 20px', borderBottom:`1px solid ${C.border}`, background:C.deep }}>
                        {['USER ID','SCORE','BAND','DOMINANT','DATE','ACTION'].map(h => (
                          <div key={h} style={{ ...mono, fontSize:8, letterSpacing:2.5, color:C.muted }}>{h}</div>
                        ))}
                      </div>
                      <div style={{ maxHeight:520, overflowY:'auto' }}>
                        {filteredCFI.length === 0 && (
                          <div style={{ padding:'40px', textAlign:'center', color:C.dim, fontSize:13 }}>No CFI results{cfiFilter !== 'all' ? ' for this band' : ''}.</div>
                        )}
                        {filteredCFI.map((r,i) => {
                          const bColor = bandColors[r.band] || C.cyan;
                          return (
                            <div key={r.id} style={{
                              display:'grid', gridTemplateColumns:'1.5fr 80px 160px 120px 100px 80px', gap:12,
                              padding:'14px 20px', borderBottom:`1px solid ${C.border}`,
                              transition:'background 0.15s',
                            }}
                              onMouseEnter={e => e.currentTarget.style.background=C.deep}
                              onMouseLeave={e => e.currentTarget.style.background='transparent'}
                            >
                              <div style={{ ...mono, fontSize:9, color:C.muted, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                                {r.user_id?.slice(0,18)}...
                              </div>
                              <div style={{ ...syne, fontSize:18, fontWeight:800, color:bColor }}>{r.total_score}</div>
                              <div>
                                <span style={{ ...mono, fontSize:8, color:bColor, background:`${bColor}12`, border:`1px solid ${bColor}30`, padding:'3px 8px', borderRadius:100 }}>
                                  {r.band?.split(' ')[0]}
                                </span>
                              </div>
                              <div style={{ fontSize:12, color:C.muted, textTransform:'capitalize' }}>{r.dominant_brain || r.dominantBrain || '—'}</div>
                              <div style={{ ...mono, fontSize:9, color:C.dim }}>
                                {r.created_at ? new Date(r.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}) : '—'}
                              </div>
                              <div>
                                <button onClick={() => deleteCFIResult(r.id)} style={{
                                  ...mono, fontSize:8, padding:'4px 10px', cursor:'pointer',
                                  background:'rgba(248,113,113,0.08)', border:'1px solid rgba(248,113,113,0.2)',
                                  color:'#F87171', borderRadius:2,
                                }}>Delete</button>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}

                {/* ─── PRO SUBSCRIBERS ─── */}
                {tab === 'pro' && (
                  <div>
                    <div style={{ display:'flex', gap:16, marginBottom:24, flexWrap:'wrap' }}>
                      <div className="card" style={{ padding:'24px 28px', flex:'none' }}>
                        <div style={{ ...mono, fontSize:8, letterSpacing:2.5, color:'#8A7A5A', marginBottom:10 }}>PRO SUBSCRIBERS</div>
                        <div style={{ ...syne, fontSize:40, fontWeight:800, color:'#E2BE78' }}>{proUsers.length}</div>
                      </div>
                      <div className="card" style={{ padding:'24px 28px', flex:'none' }}>
                        <div style={{ ...mono, fontSize:8, letterSpacing:2.5, color:'#8A7A5A', marginBottom:10 }}>CONVERSION RATE</div>
                        <div style={{ ...syne, fontSize:40, fontWeight:800, color:C.cyan }}>
                          {users.length ? Math.round(proUsers.length/users.length*100) : 0}%
                        </div>
                      </div>
                      <div className="card" style={{ padding:'24px 28px', flex:'none' }}>
                        <div style={{ ...mono, fontSize:8, letterSpacing:2.5, color:'#8A7A5A', marginBottom:10 }}>EST. REVENUE</div>
                        <div style={{ ...syne, fontSize:40, fontWeight:800, color:'#7AAFCF' }}>
                          ₦{((proUsers.length * proPrice / 100)).toLocaleString()}
                        </div>
                      </div>
                    </div>

                    <div className="card" style={{ overflow:'hidden' }}>
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1.5fr 100px 120px', gap:16, padding:'14px 20px', borderBottom:`1px solid ${C.border}`, background:C.deep }}>
                        {['NAME','EMAIL','STATUS','ACTION'].map(h => (
                          <div key={h} style={{ ...mono, fontSize:8, letterSpacing:2.5, color:C.muted }}>{h}</div>
                        ))}
                      </div>
                      <div style={{ maxHeight:480, overflowY:'auto' }}>
                        {proUsers.length === 0 && (
                          <div style={{ padding:'40px', textAlign:'center', color:C.dim, fontSize:13 }}>No Pro subscribers yet.</div>
                        )}
                        {proUsers.map((u,i) => (
                          <div key={u.id} style={{
                            display:'grid', gridTemplateColumns:'1fr 1.5fr 100px 120px', gap:16,
                            padding:'14px 20px', borderBottom:`1px solid ${C.border}`,
                            transition:'background 0.15s',
                          }}
                            onMouseEnter={e => e.currentTarget.style.background=C.deep}
                            onMouseLeave={e => e.currentTarget.style.background='transparent'}
                          >
                            <div style={{ fontSize:13, color:C.text, fontWeight:500 }}>{u.full_name || '—'}</div>
                            <div style={{ ...mono, fontSize:10, color:C.muted, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{u.email || u.id?.slice(0,16)}</div>
                            <div>
                              <span style={{ ...mono, fontSize:8, color:'#E2BE78', background:'rgba(226,190,120,0.1)', border:'1px solid rgba(226,190,120,0.25)', padding:'3px 8px', borderRadius:100 }}>ACTIVE PRO</span>
                            </div>
                            <div>
                              <button onClick={() => togglePro(u.id, true)} style={{
                                ...mono, fontSize:8, padding:'5px 12px', cursor:'pointer',
                                background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.3)',
                                color:'#F87171', borderRadius:2,
                              }}>Revoke</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* ─── PRICING ─── */}
                {tab === 'pricing' && (
                  <div style={{ maxWidth:600 }}>
                    <div className="card" style={{ padding:'40px', position:'relative', overflow:'hidden', borderColor:'rgba(196,160,80,0.3)' }}>
                      <ScanLine />
                      <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:16 }}>PRO PLAN PRICING</div>
                      <div style={{ ...syne, fontSize:22, fontWeight:800, color:C.text, marginBottom:8 }}>Edit Pro Price</div>
                      <div style={{ fontSize:13, color:C.muted, marginBottom:32, lineHeight:1.7 }}>
                        Updates the price shown on the platform and passed to Paystack for payment processing.
                        Price is stored in localStorage + Supabase <code style={{ color:C.cyan }}>platform_settings</code>.
                      </div>

                      <div style={{ marginBottom:24 }}>
                        <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>CURRENT PRICE (NAIRA)</div>
                        <div style={{ ...syne, fontSize:56, fontWeight:800, color:C.cyan, lineHeight:1, marginBottom:4 }}>
                          ₦{(proPrice/100).toLocaleString()}
                        </div>
                        <div style={{ ...mono, fontSize:9, color:C.muted }}>= {proPrice.toLocaleString()} kobo (Paystack unit)</div>
                      </div>

                      <div style={{ marginBottom:24 }}>
                        <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, marginBottom:8 }}>NEW PRICE (₦)</div>
                        <div style={{ display:'flex', gap:12, alignItems:'center' }}>
                          <div style={{ position:'relative', flex:1 }}>
                            <div style={{ position:'absolute', left:16, top:'50%', transform:'translateY(-50%)', ...syne, fontSize:16, fontWeight:700, color:C.muted }}>₦</div>
                            <input
                              type="number"
                              value={priceInput}
                              onChange={e => setPriceInput(e.target.value)}
                              style={{ paddingLeft:36, fontSize:20, ...syne, fontWeight:700 }}
                              min="100"
                              step="100"
                            />
                          </div>
                          <button className="btn-primary" onClick={savePrice} style={{ whiteSpace:'nowrap' }}>
                            {priceSaved ? '✓ Saved!' : 'Save Price'}
                          </button>
                        </div>
                        {priceInput && !isNaN(parseFloat(priceInput)) && (
                          <div style={{ ...mono, fontSize:9, color:C.muted, marginTop:8 }}>
                            Preview: ₦{parseFloat(priceInput||0).toLocaleString()} → {Math.round(parseFloat(priceInput||0)*100).toLocaleString()} kobo
                          </div>
                        )}
                      </div>

                      <div style={{ padding:'20px', background:C.deep, borderRadius:2, border:`1px solid ${C.border}` }}>
                        <div style={{ ...mono, fontSize:8, letterSpacing:3, color:C.muted, marginBottom:8 }}>PAYSTACK INTEGRATION</div>
                        <div style={{ fontSize:13, color:C.muted, lineHeight:1.7 }}>
                          Live key: <span style={{ color:C.cyan, fontFamily:'monospace' }}>pk_live_dfa71e...b129b</span><br/>
                          Currency: NGN · Gateway: Paystack inline
                        </div>
                      </div>
                    </div>

                    <div className="card" style={{ padding:'28px', marginTop:16 }}>
                      <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:12 }}>GRANT PRO MANUALLY</div>
                      <div style={{ fontSize:13, color:C.muted, marginBottom:16 }}>
                        To grant Pro access without payment, go to the <strong style={{ color:C.text }}>Users</strong> tab and click <strong style={{ color:C.text }}>Grant Pro</strong> on any user row.
                      </div>
                      <button className="btn-outline" style={{ fontSize:10 }} onClick={() => setTab('users')}>Go to Users →</button>
                    </div>
                  </div>
                )}

                {/* ─── SETTINGS ─── */}
                {tab === 'settings' && (
                  <div style={{ maxWidth:640 }}>
                    <div className="card" style={{ padding:'36px', marginBottom:16 }}>
                      <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:16 }}>PLATFORM INFO</div>
                      {[
                        { label:'Platform',      value:'NeuralFusion™ Cognitive OS' },
                        { label:'Version',        value:'v4.0' },
                        { label:'Admin Email',    value:ADMIN_EMAIL },
                        { label:'Supabase URL',   value:'ckrxgbosyohcmjtemrvu.supabase.co' },
                        { label:'Supabase Ref',   value:'civwcmteqidppscbpqni' },
                        { label:'Live App',       value:'life322-c.github.io/NeuralFusion.app2/' },
                      ].map((r,i) => (
                        <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'12px 0', borderBottom:`1px solid ${C.border}`, gap:16 }}>
                          <div style={{ ...mono, fontSize:9, letterSpacing:2, color:C.muted, flexShrink:0 }}>{r.label.toUpperCase()}</div>
                          <div style={{ fontSize:12, color:C.text, fontFamily:'monospace', textAlign:'right', wordBreak:'break-all' }}>{r.value}</div>
                        </div>
                      ))}
                    </div>

                    <div className="card" style={{ padding:'36px', marginBottom:16 }}>
                      <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:16 }}>ADMIN CONTROLS</div>
                      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0', borderBottom:`1px solid ${C.border}` }}>
                          <div>
                            <div style={{ fontSize:13, color:C.text, fontWeight:500 }}>Maintenance Mode</div>
                            <div style={{ fontSize:12, color:C.muted }}>Shows maintenance message to users (session only)</div>
                          </div>
                          <button
                            onClick={() => setMaintenanceMode(m => !m)}
                            style={{
                              ...mono, fontSize:9, padding:'8px 16px', cursor:'pointer', borderRadius:2,
                              background: maintenanceMode ? 'rgba(248,113,113,0.1)' : 'rgba(122,175,207,0.1)',
                              border: maintenanceMode ? '1px solid rgba(248,113,113,0.3)' : '1px solid rgba(122,175,207,0.3)',
                              color: maintenanceMode ? '#F87171' : '#7AAFCF',
                            }}
                          >
                            {maintenanceMode ? 'ON — Disable' : 'OFF — Enable'}
                          </button>
                        </div>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0', borderBottom:`1px solid ${C.border}` }}>
                          <div>
                            <div style={{ fontSize:13, color:C.text, fontWeight:500 }}>Refresh All Data</div>
                            <div style={{ fontSize:12, color:C.muted }}>Pull latest from Supabase</div>
                          </div>
                          <button className="btn-outline" style={{ fontSize:10 }} onClick={loadAdminData}>↺ Refresh</button>
                        </div>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 0' }}>
                          <div>
                            <div style={{ fontSize:13, color:C.text, fontWeight:500 }}>Lock Admin Portal</div>
                            <div style={{ fontSize:12, color:C.muted }}>Re-lock this session</div>
                          </div>
                          <button
                            onClick={() => { setUnlocked(false); setPin(''); setTab('overview'); }}
                            style={{
                              ...mono, fontSize:9, padding:'8px 16px', cursor:'pointer', borderRadius:2,
                              background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.3)', color:'#F87171',
                            }}
                          >Lock Portal</button>
                        </div>
                      </div>
                    </div>

                    <div className="card" style={{ padding:'28px' }}>
                      <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.cyan, marginBottom:12 }}>TABLES (SUPABASE)</div>
                      {['profiles','cfi_results','lesson_progress','platform_settings'].map((t,i) => (
                        <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:`1px solid ${C.border}` }}>
                          <div style={{ width:6, height:6, borderRadius:'50%', background:'#7AAFCF', flexShrink:0 }} />
                          <div style={{ fontFamily:'monospace', fontSize:13, color:C.text }}>{t}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    //  MAIN APP
    // ═══════════════════════════════════════════════════════════════════
    function App() {
      const [view, setView] = useState('home');
      const [showAuth, setShowAuth] = useState(false);
      const [authInitialTab, setAuthInitialTab] = useState('login');

      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      const [isPro, setIsPro] = useState(false);
      const [cfiResult, setCfiResult] = useState(null);
      const [lessonProgress, setLessonProgress] = useState({});
      const [sessions, setSessions] = useState([]);
      const [proPrice, setProPrice] = useState(() => parseInt(localStorage.getItem('nf_pro_price') || '600000'));

      // Auth
      useEffect(()=>{
        sb.auth.getSession().then(({ data })=>{
          const u = data?.session?.user || null;
          setUser(u);
          if (u) loadUser(u);
          else setAuthLoading(false);
        });
        const { data:{ subscription } } = sb.auth.onAuthStateChange((event, session)=>{
          if (event === 'PASSWORD_RECOVERY') {
            setAuthInitialTab('update-password');
            setShowAuth(true);
            setAuthLoading(false);
            return;
          }
          const u = session?.user || null;
          setUser(u);
          if (u) loadUser(u);
          else { setIsPro(false); setLessonProgress({}); setSessions([]); setAuthLoading(false); }
        });
        return ()=>subscription.unsubscribe();
      },[]);

      const loadUser = async (u) => {
        setAuthLoading(true);
        try {
          const [prof, lp] = await Promise.all([getProfile(u.id), loadLessonProgress(u.id)]);
          if (prof) { setProfile(prof); setIsPro(!!prof.is_pro); }
          setLessonProgress(lp);
        } catch(e){}
        setAuthLoading(false);
      };

      const handleSignOut = async () => {
        await sb.auth.signOut();
        setUser(null); setProfile(null); setIsPro(false); setLessonProgress({}); setSessions([]);
      };

      if (authLoading) return (
        <div style={{ background:C.void, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ textAlign:'center' }}>
            <div style={{ ...mono, fontSize:36, color:C.cyan, animation:'neuralPulse 2s ease-in-out infinite' }}>◈</div>
            <div style={{ ...mono, fontSize:9, letterSpacing:3, color:C.muted, marginTop:16 }}>INITIALIZING SYSTEM...</div>
          </div>
        </div>
      );

      const viewProps = { setView, user, setShowAuth, isPro, setIsPro, cfiResult, setCfiResult, lessonProgress, setLessonProgress, sessions, setSessions, proPrice };

      return (
        <div style={{ background:C.void, minHeight:'100vh', color:C.text }}>
          {showAuth && <AuthModal initialTab={authInitialTab} onClose={()=>{ setShowAuth(false); setAuthInitialTab('login'); }} onSuccess={()=>{ setShowAuth(false); setAuthInitialTab('login'); }} />}

          <Navbar view={view} setView={setView} user={user} setShowAuth={setShowAuth} onSignOut={handleSignOut} />

          <main>
            {view==='home'        && <HomeView {...viewProps} />}
            {view==='four-brains' && <FourBrainsView {...viewProps} />}
            {view==='cfi'         && <CFIView {...viewProps} />}
            {view==='training'    && <TrainingView {...viewProps} />}
            {view==='analytics'   && <AnalyticsView {...viewProps} />}
            {view==='lessons'     && <LessonsView {...viewProps} />}
            {view==='about'       && <AboutView {...viewProps} />}
            {view==='admin'       && user?.email === ADMIN_EMAIL && <AdminView user={user} setView={setView} onPriceChange={setProPrice} />}
          </main>

          <Footer setView={setView} />
          <BottomNav view={view} setView={setView} />
        </div>
      );
    }

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));

    // Hide splash
    window.addEventListener('load', ()=>{
      setTimeout(()=>{
        const s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(()=>s.remove(), 700); }
      }, 1800);
    });
  </script>
</body>
</html>
